version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: typmn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: typmn_db
      POSTGRES_USER: typmn_user
      POSTGRES_PASSWORD: typmn_secret_2024
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typmn_user -d typmn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: typmn_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
